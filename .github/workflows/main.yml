name: LinkedOut Backend Test

on:
  push:
    branches: [master, develop]
  pull_request: {}
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    environment: entourage-job-back-test

    env:
      CI: true
      NODE_ENV: test
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_SIGNING_SECRET: ${{ secrets.SLACK_SIGNING_SECRET }}
      OPENAI_API_KEY: ''

    steps:
      - uses: actions/checkout@v4

      - name: Cache pgvector installation
        id: cache-pgvector
        uses: actions/cache@v3
        with:
          path: /tmp/pgvector-install
          key: pgvector-v0.5.1-${{ runner.os }}

      - name: Install PostgreSQL and pgvector
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-14 postgresql-server-dev-14

          # Installer pgvector seulement si pas en cache
          if [ ! -d "/tmp/pgvector-install" ]; then
            echo "Compilation de pgvector..."
            cd /tmp
            git clone --branch v0.5.1 https://github.com/pgvector/pgvector.git
            cd pgvector
            make
            # Sauvegarder les binaires compilés
            mkdir -p /tmp/pgvector-install
            cp vector.so /tmp/pgvector-install/
            cp sql/vector--*.sql /tmp/pgvector-install/
            cp vector.control /tmp/pgvector-install/
          else
            echo "Utilisation de pgvector en cache"
          fi

          # Installer depuis le cache ou les nouveaux binaires
          sudo cp /tmp/pgvector-install/vector.so $(pg_config --pkglibdir)/
          sudo cp /tmp/pgvector-install/vector--*.sql $(pg_config --sharedir)/extension/
          sudo cp /tmp/pgvector-install/vector.control $(pg_config --sharedir)/extension/

      - name: Start PostgreSQL and create database
        run: |
          sudo systemctl start postgresql.service
          sudo -u postgres psql -c "CREATE USER linkedout WITH PASSWORD 'linkedout' SUPERUSER;"
          sudo -u postgres psql -c "CREATE DATABASE linkedout OWNER linkedout;"

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - run: yarn install
      - run: yarn db:migrate
      - run: yarn test:e2e

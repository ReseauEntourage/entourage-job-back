name: LinkedOut Backend Test

on:
  push:
    branches: [master, develop]
  pull_request: {}
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    environment: entourage-job-back-test

    services:
      postgres:
        image: pgvector/pgvector:pg17-bookworm
        env:
          POSTGRES_USER: entourage_pro
          POSTGRES_PASSWORD: entourage_pro
          POSTGRES_DB: entourage_pro
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      CI: true
      NODE_ENV: test
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_SIGNING_SECRET: ${{ secrets.SLACK_SIGNING_SECRET }}
      OPENAI_API_KEY: ''

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - run: yarn install
      - run: yarn db:migrate
      - run: yarn test:e2e

name: LinkedOut Backend Test

on:
  push:
    branches: [master, develop]
  pull_request: {}
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    environment: entourage-job-back-test

    env:
      CI: true
      NODE_ENV: test
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_SIGNING_SECRET: ${{ secrets.SLACK_SIGNING_SECRET }}
      OPENAI_API_KEY: ''

    steps:
      - uses: actions/checkout@v4

      - name: Install PostgreSQL and pgvector
        run: |
          # Ajouter le dépôt officiel PostgreSQL
          sudo apt-get update
          sudo apt-get install -y wget ca-certificates
          wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'

          # Installer PostgreSQL 17 et pgvector
          sudo apt-get update
          sudo apt-get install -y postgresql-17 postgresql-17-pgvector

      - name: Start PostgreSQL and create database
        run: |
          sudo systemctl start postgresql.service
          sudo -u postgres psql -c "CREATE USER linkedout WITH PASSWORD 'linkedout' SUPERUSER;"
          sudo -u postgres psql -c "CREATE DATABASE linkedout OWNER linkedout;"

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - run: yarn install
      - run: yarn db:migrate
      - run: yarn test:e2e

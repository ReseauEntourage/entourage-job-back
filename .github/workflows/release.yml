name: Release on master

on:
  push:
    branches: [master]

jobs:
  release:
    name: Bump version & tag
    runs-on: ubuntu-latest
    # Évite une boucle infinie : le commit de bump re-trigger ce workflow
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Token avec droits d'écriture pour pouvoir push le commit de bump
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump patch version
        run: |
          # npm version patch : met à jour package.json + crée le tag git
          # --message inclut [skip ci] pour éviter une boucle infinie
          npm version patch --message "chore: release %s [skip ci]"

      - name: Push commit & tag
        run: git push origin master --follow-tags

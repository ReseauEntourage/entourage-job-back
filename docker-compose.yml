services:
  ## ENTOURAGE PRO BACKEND API
  entourage-pro-api:
    container_name: entourage-pro-api
    build:
      context: ./
      target: base
      args:
        NODE_VERSION: 20.19.1
    volumes:
      - .:/home/node
    image: entourage-pro-api:nestjs
    ports:
      - '3002:3002'
    env_file:
      - .env
    environment:
      NODE_ENV: development
      REDIS_HOST: entourage-pro-redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: eYVX7EwVmmxKPCDmwMtyKVge8oLd2t81
      DB_HOST: entourage-pro-db
      DB_PORT: 5432
      DB_USER: entourage_pro
      DB_PASSWORD: entourage_pro
      DB_NAME: entourage_pro
    depends_on:
      - entourage-pro-db
      - entourage-pro-redis
    links:
      - entourage-pro-db
      - entourage-pro-redis

  entourage-pro-db:
    build:
      context: ./docker/postgres
      dockerfile: Dockerfile
    container_name: entourage-pro-db-postgresql
    restart: always
    environment:
      - POSTGRES_USER=entourage_pro
      - POSTGRES_PASSWORD=entourage_pro
    ports:
      - '5432:5432'
    volumes:
      - entourage-pro-db:/var/lib/postgresql/data
    command:
      - 'postgres'
      - '-c'
      - 'log_temp_files=10240'
      - '-c'
      - 'shared_buffers=3GB'
  ## ENTOURAGE PRO BACKEND CACHE
  entourage-pro-redis:
    image: redis:6.2-alpine
    container_name: entourage-pro-redis
    restart: always
    ports:
      - '6379:6379'
    command: redis-server --save 20 1 --loglevel warning --requirepass eYVX7EwVmmxKPCDmwMtyKVge8oLd2t81
    volumes:
      - entourage-pro-redis:/data
volumes:
  entourage-pro-db:
    driver: local
  entourage-pro-redis:
    driver: local

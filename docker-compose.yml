services:
  ## ENTOURAGE PRO BACKEND API
  api:
    container_name: api
    build:
      context: ./
      target: base
      args:
        NODE_VERSION: 20.19.1
    volumes:
      - .:/home/node
      - /home/node/node_modules
    ports:
      - '3002:3002'
    env_file:
      - .env
    environment:
      NODE_ENV: development
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: eYVX7EwVmmxKPCDmwMtyKVge8oLd2t81
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: entourage_pro
      DB_PASSWORD: entourage_pro
      DB_NAME: entourage_pro
      DD_AGENT_HOST: datadog
    depends_on:
      - db
      - redis
    links:
      - db
      - redis

  db:
    container_name: db
    build:
      context: ./docker/postgres
      dockerfile: Dockerfile
    restart: always
    environment:
      - POSTGRES_USER=entourage_pro
      - POSTGRES_PASSWORD=entourage_pro
    ports:
      - '5432:5432'
    volumes:
      - db:/var/lib/postgresql/data
    command:
      - 'postgres'
      - '-c'
      - 'log_temp_files=10240'
      - '-c'
      - 'shared_buffers=3GB'
  ## DATADOG AGENT
  datadog:
    container_name: datadog
    image: datadog/agent:latest
    restart: always
    environment:
      DD_API_KEY: ${DD_API_KEY}
      DD_SITE: ${DD_SITE:-datadoghq.eu}
      DD_APM_ENABLED: true
      DD_APM_NON_LOCAL_TRAFFIC: true
      DD_LOGS_ENABLED: true
      DD_LOGS_CONFIG_CONTAINER_COLLECT_ALL: true
      DD_CONTAINER_EXCLUDE: 'name:datadog'
      DD_DOGSTATSD_NON_LOCAL_TRAFFIC: true
    ports:
      - '8125:8125/udp'
      - '8126:8126'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc/:/host/proc/:ro
      - /sys/fs/cgroup/:/host/sys/fs/cgroup:ro
      - ./docker/datadog/conf.d:/etc/datadog-agent/conf.d

  ## ENTOURAGE PRO BACKEND CACHE
  redis:
    container_name: redis
    image: redis:6.2-alpine
    restart: always
    ports:
      - '6379:6379'
    command: redis-server --save 20 1 --loglevel warning --requirepass eYVX7EwVmmxKPCDmwMtyKVge8oLd2t81
    volumes:
      - redis:/data
volumes:
  db:
    driver: local
  redis:
    driver: local
